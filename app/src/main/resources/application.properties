# CORS
fnf.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
# OTP
fnf.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:5}
fnf.otp.expose-demo-otp=${OTP_EXPOSE_DEMO:true}
